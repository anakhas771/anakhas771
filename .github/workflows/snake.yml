name: Generate Contribution Grid Snake

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate contribution grid snake SVG
        uses: anuraghazra/github-contribution-grid-snake@v0.4.0
        with:
          username: anakhas771
          output: output/github-contribution-grid-snake.svg

      - name: Commit and push SVG
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add output/github-contribution-grid-snake.svg || true
          git commit -m "Update snake" || echo "No changes"
          git push
