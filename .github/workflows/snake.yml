name: Generate Contribution Grid Snake

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate snake image
        uses: Platane/snk@v3
        with:
          github_user_name: anakhas771
          outputs: |
            dist/github-snake.svg
          # optionally: color_snake, palette etc

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add dist/github-snake.svg || true
          git commit -m "chore: update snake" || echo "No changes to commit"
          git push origin HEAD:${{ github.ref_name }}
